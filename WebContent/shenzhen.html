<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>深圳站</title>
	<script src="common.js"></script>
    <style>
        body { 
            background: url("img/深圳.jpg") center top / cover no-repeat fixed;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px 0;
        }
        .query-form {
            margin-top: 20px;
        }
        input[type="text"] {
            padding: 8px 12px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 8px;
        }
        input[type="submit"], input[type="button"] {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: white;
        }
        input[type="button"] {
            background-color: #6c757d;
            color: white;
        }
        /* 按钮hover效果 */
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        input[type="button"]:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <center>
        <h2>深圳站，欢迎您</h2>
        <hr>
        <br>
        <form action="shenzhenchaxun.jsp" method="get" class="query-form">
            <input type="text" name="text1" placeholder="请输入订单号">
            <input type="submit" value="查询">
            <input type="button" value="返回首页" onclick="clickme()">
        </form>
    </center>
</body>
</html>
