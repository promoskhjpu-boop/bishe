<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>注册</title>
<link rel="stylesheet" type="text/css" href="bishe.css">
<script>
  function clickme() {
	  window.location.href="zhuye.html";
  }
  
  // 前端校验（可选，减轻服务器压力）
  function checkForm() {
      const username = document.querySelector('input[name="txtUser"]').value;
      const pwd1 = document.querySelector('input[name="txtPassword"]').value;
      const pwd2 = document.querySelector('input[name="txtPassword1"]').value;

      if (!username || username.trim() === "") {
          alert('请输入用户名！');
          return false; // 阻止表单提交
      }
      if (pwd1 !== pwd2) {
          alert('两次密码不一致！');
          return false; // 阻止表单提交
      }
      return true; // 允许提交到 zc.jsp
  }
</script>
<style>
	body{
	   background: url("img/背景草地.jpg") center top / cover no-repeat fixed;
	   margin: 0;
	   padding: 20px 0;
	}
</style>
</head>
<body>
<center>
<h1>创建您的快递账号</h1><br><br>

<!-- 关键：添加 form 标签，action指向zc.jsp -->
<form action="zc.jsp" method="post" onsubmit="return checkForm();">
    <table>            
        <tr> 
            <td>请输入用户名：</td>
            <td><input name="txtUser" type="text" size="20" placeholder="请输入用户名" required><br><br></td>
        </tr>
        <tr> 
            <td>请输入密码：</td>
            <td><input name="txtPassword" type="password" size="20" placeholder="请输入密码" required><br><br></td>
        </tr>
        <tr> 
            <td>请再输入密码：</td>
            <td><input name="txtPassword1" type="password" size="20" placeholder="请再次输入密码" required><br><br></td>
        </tr>
    </table>
    
    <!-- 关键：type改为submit，这样才能提交表单 -->
    <input type="submit" value="提交">
    <input type="reset" value="全部重写">
    <input type="button" value="返回首页" onclick="clickme()">
</form>

</center>
</body>
</html>
